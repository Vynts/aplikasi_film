<!DOCTYPE html>
<html lang="en">
  <head>
    <style>
      .judulfilm {
        color: rgb(255, 255, 255) !important;
        text-decoration: none !important;
      }

      .judulfilm:hover {
        color: orange !important;
      }
    </style>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %} Beranda {% endblock %}</title>
    <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
  />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  </head>
  <body>
    <!-- ============ NAVBAR ============ -->
    <nav class="navbar sticky-top navbar-expand-lg bg-dark shadow p-3" data-bs-theme="dark">
      <div class="container-fluid">
        <a class="navbar-brand fw-bold text-danger" href="/">NetfliC</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarScroll"
          aria-controls="navbarScroll"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarScroll">
          <ul
            class="navbar-nav me-auto my-2 my-lg-0 navbar-nav-scroll"
            style="--bs-scroll-height: 100px"
          >
            <li class="nav-item">
              <a class="nav-link" aria-current="page" href="/">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/movies"><i class="fa fa-folder-open"></i> Movie</a>
            </li>
            <li class="nav-item dropdown">
              <a
                class="nav-link dropdown-toggle"
                href="#"
                role="button"
                data-bs-toggle="dropdown"
                aria-expanded="false"
              >
                <i class="fa fa-book"></i> Genres
              </a>
              <ul class="dropdown-menu">
                {% for i in genre %}
                <li><a class="dropdown-item" href="/genres/{{ i.cur }}">{{ i.tipegenre }}</a></li>
                {% endfor %}
              </ul>
            </li>
            
          </ul>
          <form class="d-flex" role="search">
            <a class="btn btn-danger" type="submit" href="/login">
              Login
            </a>
          </form>
        </div>
      </div>
    </nav>
    <!-- ============ NAVBAR ============ -->


    <!-- ============ CONTENT ============ -->
    {% block konten %} konten {% endblock %}
    <!-- ============ CONTENT ============ -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
