{% extends 'template/themes.html' %} 
{% block title %} Movies {% endblock %} 
{% block
konten %}

<div class="position-relative text-center text-white">
  <!-- Background gambar -->
  <div
    style="
      background: url('https://i.pinimg.com/1200x/51/62/84/516284904599747f8aae5319fee0a1a0.jpg')
        center/cover no-repeat;
      height: 350px;
      position: relative;
    "
  >
    <!-- Overlay ungu -->
    <div
      style="
        background-color: rgba(0, 0, 0, 0.477);
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
      "
    ></div>

    <!-- Konten teks -->
    <div
      class="position-absolute top-50 start-50 translate-middle animate__animated animate__fadeIn"
    >
      <h4 class="fw-bold">Movies</h4>
      <p>Semua Kategori/Genre Terbaru</p>
    </div>
  </div>
</div>




<div class="container py-1">
    <h4 class="text-center my-3">Film Terbaru <hr></h4>

    <div class="row mx-auto">
        
        <div>
            <style>
                .title-text {
                    text-decoration: none !important; 
                    color: black;
                }
            </style>
        </div>

        {% for i in data %}
       <a class="col-sm-2 judulfilm p-2 rounded" href="/detail/{{ i.idfilm }}">
            <img width="200px" height="280px" src="{{ url_for('static', filename='images/' ~ i.posterfilm )}}" alt=".." class="rounded">
            <h6 class="text-black text-center m-1">{{ i.namafilm }}</h6> 
        </a>
        {% endfor %}
    </div>



</div>

{% endblock %}
